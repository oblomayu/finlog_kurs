{% extends "base.html" %}
{% block content %}
<h2>{% if transaction %}Редактирование{% else %}Новая транзакция{% endif %}</h2>

<form method="post" class="row g-3">
    <div class="col-md-3">
        <label for="type" class="form-label">Тип</label>
        <select name="type" id="type" class="form-select" required>
            <option value="expense" {% if transaction and transaction.type == 'expense' %}selected{% endif %}>Расход</option>
            <option value="income" {% if transaction and transaction.type == 'income' %}selected{% endif %}>Доход</option>
        </select>
    </div>
    <div class="col-md-3">
        <label for="amount" class="form-label">Сумма</label>
        <input type="number" step="0.01" name="amount" id="amount" class="form-control" value="{{ transaction.amount if transaction else '' }}" required>
    </div>
    <div class="col-md-3">
        <label for="date" class="form-label">Дата</label>
        <input type="date" name="date" id="date" class="form-control" value="{{ transaction.date if transaction else '' }}" required>
    </div>
    <div class="col-md-3">
        <label for="category" class="form-label">Категория</label>
        <input type="text" name="category" id="category" class="form-control" value="{{ transaction.category if transaction else '' }}">
        <small class="text-muted">Оставьте пустым — категория подберётся автоматически для расходов.</small>
    </div>
    <div class="col-12">
        <label for="description" class="form-label">Описание</label>
        <input type="text" name="description" id="description" class="form-control" value="{{ transaction.description if transaction else '' }}">
    </div>
    <div class="col-12">
        <button type="submit" class="btn btn-primary">Сохранить</button>
        <a href="{{ url_for('transactions.list') }}" class="btn btn-secondary">Отмена</a>
    </div>
</form>
{% endblock %}
